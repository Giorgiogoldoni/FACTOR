<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3 Linee — Portafoglio & Diario</title>
<style>
:root{
  --bg:#ffffff;--ink:#111;--dim:#666;--rule:#e5e5e5;
  --M:#0ea5e9;--O:#8b5cf6;--A:#dc2626;
  --green:#16a34a;--red:#dc2626;--gold:#b45309;--blue:#2563eb;
  --card:#f9f9f9;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}

/* HEADER */
header{padding:20px 32px 16px;border-bottom:2px solid var(--ink);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
header h1{font-size:20px;font-weight:600}
header h1 span{color:var(--dim);font-weight:400}
.header-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.ts{font-size:11px;color:var(--dim);font-family:monospace}

/* CAPITALE INPUT */
.capitale-bar{background:var(--card);border-bottom:1px solid var(--rule);padding:12px 32px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.capitale-bar label{font-size:12px;color:var(--dim);font-family:monospace;text-transform:uppercase;letter-spacing:.08em}
.capitale-input{font-family:monospace;font-size:15px;font-weight:600;border:1.5px solid var(--rule);border-radius:3px;padding:6px 12px;width:160px;text-align:right;outline:none;transition:border-color .15s}
.capitale-input:focus{border-color:var(--ink)}
.capitale-bar .note{font-size:11px;color:var(--dim)}
.regen-btn{padding:6px 14px;background:var(--ink);color:#fff;border:none;border-radius:3px;font-family:monospace;font-size:11px;cursor:pointer;letter-spacing:.05em}
.regen-btn:hover{opacity:.8}

main{max-width:1300px;margin:0 auto;padding:20px 32px 64px}

/* SECTION LABEL */
.sec{font-family:monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);padding:20px 0 12px;border-top:1px solid var(--rule);margin-top:4px}
.sec:first-of-type{border-top:none;padding-top:0}

/* SOMMARIO 3 LINEE */
.sommario{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:4px}
.som-card{border:2px solid var(--rule);border-radius:4px;overflow:hidden}
.som-head{padding:12px 16px;display:flex;align-items:center;gap:10px}
.som-head.M{background:#eff8ff;border-bottom:2px solid var(--M)}
.som-head.O{background:#f5f3ff;border-bottom:2px solid var(--O)}
.som-head.A{background:#fff1f1;border-bottom:2px solid var(--A)}
.som-lid{font-family:monospace;font-size:13px;font-weight:700}
.som-lid.M{color:var(--M)}.som-lid.O{color:var(--O)}.som-lid.A{color:var(--A)}
.som-nome{font-size:12px;color:var(--dim);margin-left:4px}
.som-perf{margin-left:auto;font-family:monospace;font-size:14px;font-weight:700}
.som-perf.pos{color:var(--green)}.som-perf.neg{color:var(--red)}
.som-body{padding:14px 16px;display:flex;flex-direction:column;gap:6px}
.som-row{display:flex;justify-content:space-between;font-size:12.5px}
.som-row .k{color:var(--dim)}.som-row .v{font-family:monospace;font-weight:500}

/* PORTAFOGLIO ATTUALE */
.ptf-section{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:4px}
.ptf-card{border:1.5px solid var(--rule);border-radius:4px}
.ptf-card-head{padding:10px 14px;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:8px}
.ptf-card-head .lid{font-family:monospace;font-size:11px;font-weight:700;letter-spacing:.1em}
.ptf-card-head .lid.M{color:var(--M)}.ptf-card-head .lid.O{color:var(--O)}.ptf-card-head .lid.A{color:var(--A)}
.ptf-card-head .regime{font-size:11px;color:var(--dim);margin-left:auto;text-transform:capitalize}

/* ETF TABLE */
.etf-table{width:100%;border-collapse:collapse;font-size:12px}
.etf-table th{padding:7px 10px;text-align:left;font-family:monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);border-bottom:1.5px solid var(--rule)}
.etf-table td{padding:8px 10px;border-bottom:1px solid var(--rule);vertical-align:middle}
.etf-table tr:last-child td{border:none}
.etf-table tr:hover td{background:#fafafa}
.peso-bar-track{width:60px;height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:6px}
.peso-bar-fill{height:100%;border-radius:3px}
.peso-bar-fill.M{background:var(--M)}.peso-bar-fill.O{background:var(--O)}.peso-bar-fill.A{background:var(--A)}
.perf-cell.pos{color:var(--green);font-weight:600}.perf-cell.neg{color:var(--red);font-weight:600}
.dd-cell{color:var(--red);font-size:11px}

/* DIARIO FILTRI */
.filtri{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filtro-btn{padding:5px 14px;border:1.5px solid var(--rule);border-radius:20px;font-size:11px;font-family:monospace;cursor:pointer;background:#fff;color:var(--dim);transition:all .15s}
.filtro-btn:hover{border-color:var(--ink);color:var(--ink)}
.filtro-btn.active{border-color:var(--ink);background:var(--ink);color:#fff}
.filtro-btn.M.active{border-color:var(--M);background:var(--M)}
.filtro-btn.O.active{border-color:var(--O);background:var(--O)}
.filtro-btn.A.active{border-color:var(--A);background:var(--A)}
.filtri-sep{color:var(--rule);font-size:18px}

/* DIARIO TABLE */
.diario-table{width:100%;border-collapse:collapse;font-size:12.5px}
.diario-table th{padding:9px 12px;text-align:left;font-family:monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);border-bottom:2px solid var(--ink);white-space:nowrap}
.diario-table td{padding:9px 12px;border-bottom:1px solid var(--rule);vertical-align:middle}
.diario-table tr:hover td{background:#fafafa}
.diario-table tr.hidden{display:none}

/* BADGE TIPO */
.tipo-badge{display:inline-block;padding:2px 8px;border-radius:2px;font-family:monospace;font-size:10px;font-weight:600;white-space:nowrap}
.tipo-badge.rotation{background:#eff6ff;color:#2563eb}
.tipo-badge.regime{background:#f5f3ff;color:#7c3aed}
.tipo-badge.drawdown{background:#fff1f1;color:#dc2626}
.tipo-badge.init{background:#f9f9f9;color:#666}

/* AZIONE */
.azione{display:inline-block;padding:2px 8px;border-radius:2px;font-family:monospace;font-size:10px;font-weight:700}
.azione.VENDE{background:#fee2e2;color:var(--red)}
.azione.ACQUISTA{background:#dcfce7;color:var(--green)}
.azione.APRE{background:#eff6ff;color:var(--blue)}

/* TICKER */
.ticker-cell{font-family:monospace;font-weight:600}
.ticker-cell.out{color:var(--red)}.ticker-cell.in{color:var(--green)}

/* EMPTY */
.empty{padding:32px;text-align:center;color:var(--dim);font-size:12px}
.loading{padding:48px;text-align:center;color:var(--dim);font-family:monospace;animation:pulse 1.5s infinite}
.err{padding:32px;text-align:center;color:var(--red);font-family:monospace}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* STATS DIARIO */
.diario-stats{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:16px;padding:12px 16px;background:var(--card);border-radius:4px;font-size:12px}
.ds-item .ds-label{color:var(--dim);font-size:10px;font-family:monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.ds-item .ds-val{font-family:monospace;font-weight:600;font-size:14px}

@media(max-width:900px){
  header,main,.capitale-bar{padding-left:16px;padding-right:16px}
  .sommario,.ptf-section{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <h1>3 Linee <span>— Portafoglio & Diario</span></h1>
  <div class="header-right">
    <a href="strategia-3linee.html" style="font-size:11px;font-family:monospace;color:var(--dim);text-decoration:none">← 3 Linee</a>
    <a href="fase2.html" style="font-size:11px;font-family:monospace;color:var(--dim);text-decoration:none">Fase 2 →</a>
    <span class="ts" id="ts-update">—</span>
  </div>
</header>

<div class="capitale-bar">
  <label>Capitale totale</label>
  <input class="capitale-input" type="number" id="capitale-input" value="300000" step="10000" min="10000">
  <span class="note">€ — modifica per scalare tutti gli importi</span>
  <button class="regen-btn" onclick="aggiornaCapitale()">↻ Aggiorna</button>
</div>

<main>
  <div id="loading" class="loading">Caricamento...</div>
  <div id="content" style="display:none">

    <!-- SOMMARIO -->
    <div class="sec">Riepilogo linee</div>
    <div class="sommario" id="sommario"></div>

    <!-- PORTAFOGLIO ATTUALE -->
    <div class="sec">Portafoglio attuale</div>
    <div class="ptf-section" id="ptf-section"></div>

    <!-- DIARIO -->
    <div class="sec">Diario movimenti</div>
    <div class="diario-stats" id="diario-stats"></div>
    <div class="filtri">
      <button class="filtro-btn active" onclick="setFiltro('linea','ALL',this)">Tutte le linee</button>
      <button class="filtro-btn M" onclick="setFiltro('linea','M',this)">M — Monetario</button>
      <button class="filtro-btn O" onclick="setFiltro('linea','O',this)">O — Obbligazionario</button>
      <button class="filtro-btn A" onclick="setFiltro('linea','A',this)">A — Azionario</button>
      <span class="filtri-sep">|</span>
      <button class="filtro-btn active" onclick="setFiltro('tipo','ALL',this)">Tutti i movimenti</button>
      <button class="filtro-btn" onclick="setFiltro('tipo','rotation',this)">Rotazioni</button>
      <button class="filtro-btn" onclick="setFiltro('tipo','regime',this)">Cambi regime</button>
      <button class="filtro-btn" onclick="setFiltro('tipo','drawdown',this)">Drawdown stop</button>
    </div>
    <table class="diario-table">
      <thead>
        <tr>
          <th>Data</th>
          <th>Linea</th>
          <th>Tipo</th>
          <th>Azione</th>
          <th>ETF</th>
          <th>Nome</th>
          <th>Prezzo in</th>
          <th>Prezzo out</th>
          <th>Perf</th>
          <th>Dettaglio</th>
        </tr>
      </thead>
      <tbody id="diario-body"></tbody>
    </table>
    <div id="diario-empty" class="empty" style="display:none">Nessun movimento con i filtri selezionati</div>

  </div>
  <div id="err" class="err" style="display:none"></div>
</main>

<script>
const URL_3L = 'https://giorgiogoldoni.github.io/FACTOR/data/compass_3linee.json';
const fmt    = (n,d=1) => n==null?'—':(n>=0?'+':'')+n.toFixed(d)+'%';
const fmtP   = n => n==null?'—':n.toFixed(4)+'€';
const fmtC   = (n,cap) => {
  if (n==null) return '—';
  // n è in euro base 100k, scala a capitale reale
  return Math.round(n * cap / 100000).toLocaleString('it')+'€';
};
const fmtAbs = n => n==null?'—':n.toLocaleString('it')+'€';
const cap1   = s => s?s.charAt(0).toUpperCase()+s.slice(1):'—';

let DATA_GLOBAL = null;
let FILTRO_LINEA = 'ALL';
let FILTRO_TIPO  = 'ALL';

function getCap() {
  return parseFloat(document.getElementById('capitale-input').value) || 300000;
}

function aggiornaCapitale() {
  if (DATA_GLOBAL) renderAll(DATA_GLOBAL);
}

async function load() {
  try {
    const r = await fetch(URL_3L+'?t='+Date.now());
    if (!r.ok) throw new Error(r.status);
    DATA_GLOBAL = await r.json();
    renderAll(DATA_GLOBAL);
  } catch(e) {
    document.getElementById('loading').style.display='none';
    const err = document.getElementById('err');
    err.style.display='block';
    err.textContent='Errore caricamento: '+e.message;
  }
}

function renderAll(d) {
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
  const ts = d.generated ? new Date(d.generated).toLocaleString('it') : '—';
  document.getElementById('ts-update').textContent = ts;

  const ptf = d.portafogli_3linee || {};
  const cap = getCap();
  const capPerLinea = cap / 3;

  renderSommario(ptf, cap, capPerLinea);
  renderPortafoglio(ptf, capPerLinea);
  renderDiario(ptf);
}

// ── SOMMARIO ───────────────────────────────────────────────────────────
function renderSommario(ptf, cap, capPerLinea) {
  const sg = document.getElementById('sommario');
  sg.innerHTML = '';
  const nomi = {M:'Monetario — Bunker', O:'Obbligazionario — Cuscinetto', A:'Azionario — Motore'};
  const bm   = {M:'XEON.MI', O:'IEAG.MI', A:'IWMO.MI'};

  ['M','O','A'].forEach(lid => {
    const p   = ptf[lid] || {};
    const perf = p.performance_totale_pct;
    const capAtt = p.capitale_attuale;
    const capScalato = capAtt ? Math.round(capAtt * capPerLinea / 100000) : null;
    const out  = p.outperformance_bm;
    const mdd  = p.max_drawdown;
    const sh   = p.sharpe;
    const reg  = (p.storia||[]).find(v=>!v.data_chiusura)?.regime || '—';
    const cedola = lid==='O' ? p.cedola_aggregata_pct : null;

    sg.innerHTML += `
      <div class="som-card">
        <div class="som-head ${lid}">
          <span class="som-lid ${lid}">${lid}</span>
          <span class="som-nome">${nomi[lid]}</span>
          <span class="som-perf ${perf>=0?'pos':'neg'}">${fmt(perf)}</span>
        </div>
        <div class="som-body">
          <div class="som-row"><span class="k">Capitale attuale</span><span class="v">${capScalato!=null?capScalato.toLocaleString('it')+'€':'—'}</span></div>
          <div class="som-row"><span class="k">vs ${bm[lid]}</span><span class="v" style="color:${out>=0?'var(--green)':'var(--red)'}">${out!=null?(out>=0?'+':'')+out.toFixed(1)+'pp':'—'}</span></div>
          <div class="som-row"><span class="k">MDD</span><span class="v">${mdd!=null?mdd.toFixed(1)+'%':'—'}</span></div>
          <div class="som-row"><span class="k">Sharpe</span><span class="v">${sh!=null?sh.toFixed(2):'—'}</span></div>
          ${cedola!=null?`<div class="som-row"><span class="k">Cedola</span><span class="v" style="color:var(--green)">${cedola.toFixed(1)}% ${p.cedola_ok?'✅':'⚠️'}</span></div>`:''}
          <div class="som-row"><span class="k">Regime</span><span class="v" style="text-transform:capitalize">${cap1(reg)}</span></div>
        </div>
      </div>`;
  });
}

// ── PORTAFOGLIO ATTUALE ────────────────────────────────────────────────
function renderPortafoglio(ptf, capPerLinea) {
  const ps = document.getElementById('ptf-section');
  ps.innerHTML = '';

  ['M','O','A'].forEach(lid => {
    const p = ptf[lid] || {};
    const storia = p.storia || [];
    const verAtt = storia.find(v=>!v.data_chiusura) || storia[storia.length-1] || {};
    const comp   = verAtt.composizione || [];
    const reg    = verAtt.regime || '—';
    const giorni = verAtt.data_apertura ?
      Math.round((Date.now() - new Date(verAtt.data_apertura))/86400000) : null;

    let rows = '';
    comp.sort((a,b)=>(b.peso||0)-(a.peso||0)).forEach(e => {
      const imp = e.importo ? Math.round(e.importo * capPerLinea / 100000) : null;
      const perf = e.perf_pct;
      const dd   = e.drawdown_pct;
      rows += `<tr>
        <td style="font-family:monospace;font-size:12px;font-weight:600">${e.ticker||'—'}</td>
        <td style="max-width:130px;font-size:11px;color:var(--dim)">${(e.nome||'').replace('WisdomTree','WT').replace('iShares','iSh')}</td>
        <td>
          <span style="font-family:monospace;font-size:12px">${e.peso!=null?e.peso.toFixed(0)+'%':'—'}</span>
          <div class="peso-bar-track"><div class="peso-bar-fill ${lid}" style="width:${Math.min(e.peso||0,100)}%"></div></div>
        </td>
        <td style="font-family:monospace;font-size:12px">${imp!=null?imp.toLocaleString('it')+'€':'—'}</td>
        <td class="perf-cell ${perf>=0?'pos':'neg'}">${fmt(perf)}</td>
        <td class="dd-cell">${dd!=null&&dd<0?dd.toFixed(1)+'%':'—'}</td>
        <td style="font-family:monospace;font-size:11px;color:var(--dim)">${e.price_entry!=null?e.price_entry.toFixed(3):'—'}</td>
      </tr>`;
    });

    if (!rows) rows = `<tr><td colspan="7" class="empty">Nessun ETF in portafoglio</td></tr>`;

    ps.innerHTML += `
      <div class="ptf-card">
        <div class="ptf-card-head">
          <span class="lid ${lid}">${lid} — ${{M:'Monetario',O:'Obbligazionario',A:'Azionario'}[lid]}</span>
          <span class="regime">${cap1(reg)}${giorni!=null?' · '+giorni+'gg':''}</span>
        </div>
        <table class="etf-table">
          <thead><tr><th>Ticker</th><th>Nome</th><th>Peso</th><th>Importo</th><th>Perf</th><th>DD</th><th>P.entrata</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  });
}

// ── COSTRUISCE DIARIO COMPLETO ─────────────────────────────────────────
function costruisciDiario(ptf) {
  const movimenti = [];

  ['M','O','A'].forEach(lid => {
    const p = ptf[lid] || {};
    const storia = p.storia || [];

    storia.forEach((ver, idx) => {
      // Apertura versione (acquisti)
      if (idx > 0 || ver.trigger_apertura === 'inizializzazione') {
        const tipo = ver.trigger_apertura?.includes('rotation') ? 'rotation'
                   : ver.trigger_apertura?.includes('regime')   ? 'regime'
                   : ver.trigger_apertura?.includes('drawdown') || ver.trigger_apertura?.includes('floor') ? 'drawdown'
                   : 'init';

        // Acquisti = ETF nella nuova versione non presenti nella precedente
        const prevComp = idx > 0 ? new Set((storia[idx-1]?.composizione||[]).map(e=>e.ticker)) : new Set();
        ;(ver.composizione||[]).forEach(e => {
          if (!prevComp.has(e.ticker) || idx===0) {
            movimenti.push({
              data:    ver.data_apertura || '—',
              linea:   lid,
              tipo,
              azione:  idx===0 ? 'APRE' : 'ACQUISTA',
              ticker:  e.ticker,
              nome:    e.nome || e.ticker,
              peso:    e.peso,
              prezzo_in:  e.price_entry,
              prezzo_out: null,
              perf:    null,
              dettaglio: ver.trigger_apertura || '—',
              _ver: ver.versione,
            });
          }
        });
      }

      // Uscite = etf_usciti
      ;(ver.etf_usciti||[]).forEach(u => {
        const tipo = u.motivo === 'rotation_momentum' ? 'rotation'
                   : u.motivo === 'drawdown'          ? 'drawdown'
                   : 'regime';
        movimenti.push({
          data:    u.data || ver.aggiornato || '—',
          linea:   lid,
          tipo,
          azione:  'VENDE',
          ticker:  u.ticker,
          nome:    u.nome || u.ticker,
          peso:    null,
          prezzo_in:  u.price_entry,
          prezzo_out: u.price_exit,
          perf:    u.perf_pct,
          dettaglio: u.motivo + (u.mom3m_out!=null ? ` · mom3M ${u.mom3m_out.toFixed(1)}%→${(u.mom3m_in||0).toFixed(1)}%` : ''),
          _ver: ver.versione,
        });
      });
    });

    // Versioni chiuse: aggiungi vendita ETF all'uscita
    storia.filter(v=>v.data_chiusura).forEach(ver => {
      const nextVer = storia.find(v=>v.versione === ver.versione+1);
      if (!nextVer) return;
      const nextComp = new Set((nextVer.composizione||[]).map(e=>e.ticker));
      ;(ver.composizione||[]).forEach(e => {
        if (!nextComp.has(e.ticker)) {
          // Solo se non già in etf_usciti
          const giaInUsciti = (ver.etf_usciti||[]).some(u=>u.ticker===e.ticker);
          if (!giaInUsciti) {
            const tipo = ver.trigger_chiusura?.includes('rotation') ? 'rotation'
                       : ver.trigger_chiusura?.includes('drawdown') || ver.trigger_chiusura?.includes('floor') ? 'drawdown'
                       : 'regime';
            movimenti.push({
              data:    ver.data_chiusura,
              linea:   lid,
              tipo,
              azione:  'VENDE',
              ticker:  e.ticker,
              nome:    e.nome || e.ticker,
              peso:    e.peso,
              prezzo_in:  e.price_entry,
              prezzo_out: e.price_now,
              perf:    e.perf_pct,
              dettaglio: ver.trigger_chiusura || '—',
              _ver: ver.versione,
            });
          }
        }
      });
    });
  });

  // Ordina per data decrescente
  movimenti.sort((a,b) => (b.data||'').localeCompare(a.data||''));
  return movimenti;
}

let MOVIMENTI_GLOBALI = [];

function renderDiario(ptf) {
  MOVIMENTI_GLOBALI = costruisciDiario(ptf);

  // Stats
  const n_tot  = MOVIMENTI_GLOBALI.length;
  const n_rot  = MOVIMENTI_GLOBALI.filter(m=>m.tipo==='rotation').length;
  const n_reg  = MOVIMENTI_GLOBALI.filter(m=>m.tipo==='regime').length;
  const n_dd   = MOVIMENTI_GLOBALI.filter(m=>m.tipo==='drawdown').length;
  const n_vend = MOVIMENTI_GLOBALI.filter(m=>m.azione==='VENDE').length;
  const perfs  = MOVIMENTI_GLOBALI.filter(m=>m.perf!=null&&m.azione==='VENDE').map(m=>m.perf);
  const avg_perf = perfs.length ? perfs.reduce((a,b)=>a+b,0)/perfs.length : null;

  document.getElementById('diario-stats').innerHTML = `
    <div class="ds-item"><div class="ds-label">Movimenti totali</div><div class="ds-val">${n_tot}</div></div>
    <div class="ds-item"><div class="ds-label">Vendite</div><div class="ds-val">${n_vend}</div></div>
    <div class="ds-item"><div class="ds-label">Rotazioni</div><div class="ds-val">${n_rot}</div></div>
    <div class="ds-item"><div class="ds-label">Cambi regime</div><div class="ds-val">${n_reg}</div></div>
    <div class="ds-item"><div class="ds-label">Drawdown stop</div><div class="ds-val">${n_dd}</div></div>
    ${avg_perf!=null?`<div class="ds-item"><div class="ds-label">Perf media uscite</div><div class="ds-val" style="color:${avg_perf>=0?'var(--green)':'var(--red)'}">${fmt(avg_perf)}</div></div>`:''}`;

  applicaFiltri();
}

function applicaFiltri() {
  const tbody = document.getElementById('diario-body');
  tbody.innerHTML = '';

  const filtrati = MOVIMENTI_GLOBALI.filter(m => {
    const okLinea = FILTRO_LINEA==='ALL' || m.linea===FILTRO_LINEA;
    const okTipo  = FILTRO_TIPO==='ALL'  || m.tipo===FILTRO_TIPO;
    return okLinea && okTipo;
  });

  const empty = document.getElementById('diario-empty');
  if (!filtrati.length) {
    empty.style.display='block';
    return;
  }
  empty.style.display='none';

  filtrati.forEach(m => {
    const tipoLabel = {rotation:'Rotation',regime:'Cambio regime',drawdown:'Drawdown stop',init:'Apertura'}[m.tipo]||m.tipo;
    const azCls = m.azione;
    const lidColor = {M:'var(--M)',O:'var(--O)',A:'var(--A)'}[m.linea]||'var(--dim)';
    const perfCls = m.perf!=null ? (m.perf>=0?'pos':'neg') : '';

    tbody.innerHTML += `<tr data-linea="${m.linea}" data-tipo="${m.tipo}">
      <td style="font-family:monospace;font-size:11px;white-space:nowrap">${m.data}</td>
      <td><span style="font-family:monospace;font-size:11px;font-weight:700;color:${lidColor}">${m.linea}</span></td>
      <td><span class="tipo-badge ${m.tipo}">${tipoLabel}</span></td>
      <td><span class="azione ${azCls}">${m.azione}</span></td>
      <td class="ticker-cell ${m.azione==='VENDE'?'out':'in'}">${m.ticker}</td>
      <td style="font-size:11.5px;color:var(--dim);max-width:160px">${(m.nome||'').replace('WisdomTree','WT').replace('iShares','iSh')}</td>
      <td style="font-family:monospace;font-size:11px">${m.prezzo_in!=null?m.prezzo_in.toFixed(3):'—'}</td>
      <td style="font-family:monospace;font-size:11px">${m.prezzo_out!=null?m.prezzo_out.toFixed(3):'—'}</td>
      <td class="perf-cell ${perfCls}" style="font-family:monospace">${m.perf!=null?fmt(m.perf):'—'}</td>
      <td style="font-size:11px;color:var(--dim);max-width:200px">${(m.dettaglio||'—').substring(0,60)}${(m.dettaglio||'').length>60?'…':''}</td>
    </tr>`;
  });
}

function setFiltro(tipo, val, btn) {
  if (tipo==='linea') {
    FILTRO_LINEA = val;
    document.querySelectorAll('.filtro-btn.M,.filtro-btn.O,.filtro-btn.A,[onclick*="linea"]')
      .forEach(b => b.classList.remove('active'));
  } else {
    FILTRO_TIPO = val;
    document.querySelectorAll('[onclick*="tipo"]')
      .forEach(b => b.classList.remove('active'));
  }
  btn.classList.add('active');
  applicaFiltri();
}

load();
</script>
</body>
</html>
