<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMPASS ETP — Portafoglio Presente + Futuro</title>
<style>
:root{
  --bg:#fff;--ink:#111;--dim:#666;--rule:#e5e5e5;
  --green:#16a34a;--red:#dc2626;--gold:#b45309;--blue:#2563eb;
  --etp:#7c3aed;
  --card:#f9f9f9;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}

header{padding:20px 32px 16px;border-bottom:2px solid var(--ink);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
header h1{font-size:20px;font-weight:700}
header h1 span{color:var(--etp)}
.header-links{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.nav-link{font-size:11px;font-family:monospace;color:var(--dim);text-decoration:none;padding:4px 10px;border:1px solid var(--rule);border-radius:2px}
.nav-link:hover{border-color:var(--ink);color:var(--ink)}
.ts{font-size:11px;color:var(--dim);font-family:monospace}

main{max-width:1300px;margin:0 auto;padding:20px 32px 64px}
.sec{font-family:monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);padding:20px 0 12px;border-top:1px solid var(--rule)}
.sec:first-of-type{border-top:none;padding-top:0}

/* HERO KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:1px;background:var(--rule);border:1px solid var(--rule);border-radius:4px;overflow:hidden;margin-bottom:20px}
.kpi{background:var(--bg);padding:14px 16px}
.kpi .k{font-size:9px;font-family:monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.kpi .v{font-size:18px;font-weight:700;font-family:monospace}
.kpi .v.pos{color:var(--green)}.kpi .v.neg{color:var(--red)}.kpi .v.etp{color:var(--etp)}
.kpi .sub{font-size:10px;color:var(--dim);margin-top:2px;font-family:monospace}

/* SIGNAL BADGE */
.sig-badge{display:inline-block;padding:3px 12px;border-radius:2px;font-family:monospace;font-size:11px;font-weight:700;color:#fff}
.sig-badge.HOLD{background:var(--green)}.sig-badge.WATCH{background:var(--gold)}.sig-badge.ROTATE{background:var(--red)}

/* FORECAST STRIP */
.forecast-strip{display:grid;grid-template-columns:auto 1fr auto;gap:20px;align-items:center;padding:16px 20px;border:1.5px solid var(--rule);border-radius:4px;margin-bottom:20px}
.fc-segnale{text-align:center}
.fc-segnale .emoji{font-size:28px}
.fc-segnale .nome{font-family:monospace;font-size:13px;font-weight:700;margin-top:4px}
.fc-probs{display:flex;flex-direction:column;gap:6px}
.prob-row{display:flex;align-items:center;gap:8px}
.prob-label{font-size:11px;font-family:monospace;color:var(--dim);min-width:100px;text-transform:capitalize}
.prob-track{flex:1;height:16px;background:#f0f0f0;border-radius:2px;overflow:hidden}
.prob-fill{height:100%;border-radius:2px;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:600;color:#fff}
.prob-fill.goldilocks{background:#16a34a}.prob-fill.euforia{background:#0ea5e9}
.prob-fill.reflazione{background:#b45309}.prob-fill.stagflazione{background:#7c3aed}
.prob-fill.risk_off{background:#dc2626}.prob-fill.neutro{background:#6b7280}
.fc-pesi{text-align:right}
.fc-pesi .pw-row{font-family:monospace;font-size:12px;margin-bottom:4px}
.fc-pesi .pw-label{color:var(--dim)}

/* EQUITY CHART */
canvas{display:block;width:100%}
.chart-wrap{margin-bottom:4px}

/* COMPOSIZIONE */
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:4px}
.comp-table{width:100%;border-collapse:collapse;font-size:12.5px}
.comp-table th{padding:8px 10px;text-align:left;font-family:monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);border-bottom:2px solid var(--ink)}
.comp-table td{padding:9px 10px;border-bottom:1px solid var(--rule);vertical-align:middle}
.comp-table tr:hover td{background:#fafafa}
.peso-bar-track{width:50px;height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:6px}
.peso-bar-fill{height:100%;border-radius:3px;background:var(--etp)}
.cat-badge{display:inline-block;padding:1px 6px;border-radius:2px;font-family:monospace;font-size:9px;font-weight:600;color:#fff}
.cat-badge.az_globale{background:#2563eb}.cat-badge.az_europa{background:#16a34a}
.cat-badge.az_usa{background:#0284c7}.cat-badge.az_em{background:#b45309}
.cat-badge.tematico{background:#7c3aed}.cat-badge.hy{background:#dc2626}
.cat-badge.obbligaz_ig{background:#6b7280}.cat-badge.leva{background:#1a1a1a}
.cat-badge.monetario{background:#9ca3af}.cat-badge.em_bond{background:#92400e}

/* STORIA REGIME */
.regime-history{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.rh-pill{padding:4px 12px;border-radius:20px;font-family:monospace;font-size:11px;font-weight:600;color:#fff}
.rh-pill.goldilocks{background:#16a34a}.rh-pill.reflazione{background:#b45309}
.rh-pill.stagflazione{background:#7c3aed}.rh-pill.risk_off{background:#dc2626}
.rh-pill.neutro{background:#6b7280}.rh-pill.euforia{background:#0ea5e9}

/* VERSIONI */
.ver-table{width:100%;border-collapse:collapse;font-size:12px}
.ver-table th{padding:7px 10px;text-align:left;font-family:monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);border-bottom:2px solid var(--ink)}
.ver-table td{padding:8px 10px;border-bottom:1px solid var(--rule);vertical-align:middle}
.ver-table tr:hover td{background:#fafafa}

.loading{padding:48px;text-align:center;color:var(--dim);font-family:monospace;animation:pulse 1.5s infinite}
.err{padding:32px;text-align:center;color:var(--red);font-family:monospace}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

@media(max-width:900px){
  header,main{padding-left:16px;padding-right:16px}
  .comp-grid{grid-template-columns:1fr}
  .forecast-strip{grid-template-columns:1fr;text-align:center}
  .fc-pesi{text-align:left}
}
</style>
</head>
<body>

<header>
  <h1>COMPASS <span>ETP</span></h1>
  <div class="header-links">
    <a href="index.html" class="nav-link">← FACTOR</a>
    <a href="strategia-3linee.html" class="nav-link">3 Linee</a>
    <a href="confronto.html" class="nav-link">Confronto</a>
    <span class="ts" id="ts-update">—</span>
  </div>
</header>

<main>
  <div id="loading" class="loading">Caricamento dati ETP...</div>
  <div id="content" style="display:none">

    <div class="sec">Performance</div>
    <div class="kpi-grid" id="kpi-grid"></div>

    <div class="sec">Forecast regime</div>
    <div class="forecast-strip" id="forecast-strip"></div>

    <div class="sec">Equity curve (mensile)</div>
    <div class="chart-wrap"><canvas id="c-equity" height="240"></canvas></div>

    <div class="sec">Portafoglio corrente</div>
    <div class="comp-grid">
      <div>
        <table class="comp-table">
          <thead><tr><th>Ticker</th><th>Nome</th><th>Categoria</th><th>Peso</th><th>Score</th></tr></thead>
          <tbody id="comp-body"></tbody>
        </table>
      </div>
      <div>
        <canvas id="c-donut" height="300"></canvas>
      </div>
    </div>

    <div class="sec">Storia regime</div>
    <div class="regime-history" id="regime-history"></div>

    <div class="sec">Storico versioni portafoglio</div>
    <table class="ver-table">
      <thead><tr><th>Data</th><th>Regime</th><th>Conf</th><th>Capitale</th><th>N ETF</th><th>Forecast</th><th>Peso futuro</th></tr></thead>
      <tbody id="ver-body"></tbody>
    </table>

  </div>
  <div id="err" class="err" style="display:none"></div>
</main>

<script>
const URL_ETP = 'https://giorgiogoldoni.github.io/FACTOR/data/compass_etp.json';
const fmt = (n,d=1) => n==null?'—':(n>=0?'+':'')+n.toFixed(d)+'%';
const fmtC = n => n==null?'—':Math.round(n).toLocaleString('it')+'€';
const cap1 = s => s ? s.charAt(0).toUpperCase()+s.slice(1) : '—';

const REGIME_COLORS = {
  goldilocks:'#16a34a',euforia:'#0ea5e9',reflazione:'#b45309',
  stagflazione:'#7c3aed',risk_off:'#dc2626',neutro:'#6b7280'
};

async function load() {
  try {
    const r = await fetch(URL_ETP+'?t='+Date.now());
    if (!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    render(d);
  } catch(e) {
    document.getElementById('loading').style.display='none';
    const err = document.getElementById('err');
    err.style.display='block';
    err.textContent='Errore: '+e.message;
  }
}

function render(d) {
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';

  const ts = d.generated ? new Date(d.generated).toLocaleString('it') : '—';
  document.getElementById('ts-update').textContent = ts;

  const reg  = d.regime_oggi || {};
  const fc   = d.forecast || {};
  const comp = d.composizione_corrente || [];
  const eq   = d.equity_mensile || [];

  // ── KPI ────────────────────────────────────────────────────────────
  const kpis = [
    {k:'Strategia',  v:'ETP Presente+Futuro', cls:'etp', sub:'Universo '+d.n_etf_universo+' ETF'},
    {k:'Performance',v:fmt(d.performance_totale_pct), cls:d.performance_totale_pct>=0?'pos':'neg', sub:'da '+d.backtest_start},
    {k:'Capitale',   v:fmtC(d.capitale_attuale), cls:'', sub:'su €100.000 iniziali'},
    {k:'MDD',        v:fmt(d.max_drawdown), cls:'neg', sub:'max drawdown'},
    {k:'Sharpe',     v:d.sharpe?d.sharpe.toFixed(2):'—', cls:'', sub:'risk-adjusted'},
    {k:'vs '+d.benchmark, v:d.outperformance!=null?fmt(d.outperformance):'—', cls:d.outperformance>=0?'pos':'neg', sub:'outperformance'},
    {k:'Regime oggi',v:cap1(reg.scenario), cls:'', sub:'conf '+reg.confidence+'%'},
    {k:'Rebalancing',v:d.n_rebalancing||'—', cls:'', sub:'eseguiti'},
  ];
  const kg = document.getElementById('kpi-grid');
  kpis.forEach(k => {
    kg.innerHTML += `<div class="kpi">
      <div class="k">${k.k}</div>
      <div class="v ${k.cls}">${k.v}</div>
      <div class="sub">${k.sub}</div>
    </div>`;
  });

  // ── FORECAST ───────────────────────────────────────────────────────
  const segnale = fc.segnale || 'HOLD';
  const emojis  = {HOLD:'✅',WATCH:'⚠️',ROTATE:'🔴'};
  const probs   = fc.probs || {};
  const probsHtml = Object.entries(probs)
    .sort((a,b)=>b[1]-a[1])
    .map(([sc,pct]) => `
      <div class="prob-row">
        <span class="prob-label">${cap1(sc)}</span>
        <div class="prob-track"><div class="prob-fill ${sc}" style="width:${pct}%">${pct>8?pct.toFixed(0)+'%':''}</div></div>
        <span style="font-family:monospace;font-size:11px;min-width:32px;text-align:right">${pct.toFixed(0)}%</span>
      </div>`).join('');

  document.getElementById('forecast-strip').innerHTML = `
    <div class="fc-segnale">
      <div class="emoji">${emojis[segnale]||'—'}</div>
      <div class="nome"><span class="sig-badge ${segnale}">${segnale}</span></div>
      <div style="margin-top:8px;font-size:12px;color:var(--dim)">
        → <strong>${cap1(fc.regime_4w)}</strong> (${(fc.prob_4w||0).toFixed(0)}%)
      </div>
    </div>
    <div class="fc-probs">${probsHtml}</div>
    <div class="fc-pesi">
      <div class="pw-row"><span class="pw-label">Peso presente: </span><strong>${((fc.peso_presente||1)*100).toFixed(0)}%</strong></div>
      <div class="pw-row"><span class="pw-label">Peso futuro: </span><strong>${((fc.peso_futuro||0)*100).toFixed(0)}%</strong></div>
      <div style="margin-top:12px;font-size:11px;color:var(--dim)">Regole attivate:<br><strong>${fc.n_attivate||0}/25</strong></div>
    </div>`;

  // ── EQUITY CHART ───────────────────────────────────────────────────
  if (eq.length > 0) drawEquity(eq);

  // ── COMPOSIZIONE ───────────────────────────────────────────────────
  const cb = document.getElementById('comp-body');
  comp.forEach(p => {
    const catLabel = p.cat?.replace('_',' ') || '—';
    cb.innerHTML += `<tr>
      <td style="font-family:monospace;font-weight:600">${p.ticker}</td>
      <td style="font-size:11.5px;color:var(--dim);max-width:160px">${(p.nome||'').replace('iShares','iSh').replace('WisdomTree','WT')}</td>
      <td><span class="cat-badge ${p.cat}">${catLabel}</span></td>
      <td>
        <span style="font-family:monospace">${p.peso?.toFixed(1)||'—'}%</span>
        <div class="peso-bar-track"><div class="peso-bar-fill" style="width:${Math.min(p.peso||0,15)/15*100}%"></div></div>
      </td>
      <td style="font-family:monospace;color:var(--etp)">${p.score?.toFixed(0)||'—'}</td>
    </tr>`;
  });

  // Donut composizione per categoria
  drawDonut(comp);

  // ── STORIA REGIME ──────────────────────────────────────────────────
  const rh = document.getElementById('regime-history');
  (d.storia_regime||[]).slice(-15).forEach(r => {
    rh.innerHTML += `<span class="rh-pill ${r.regime}">${r.data.slice(5)} ${cap1(r.regime)} ${r.conf}%</span>`;
  });

  // ── VERSIONI ───────────────────────────────────────────────────────
  const vb = document.getElementById('ver-body');
  const versioni = (d.versioni||[]).slice().reverse().slice(0,20);
  versioni.forEach(v => {
    const fc_v = v.forecast || {};
    const regColor = REGIME_COLORS[v.regime] || '#666';
    vb.innerHTML += `<tr>
      <td style="font-family:monospace;font-size:11px">${v.data}</td>
      <td><span style="color:${regColor};font-weight:600;text-transform:capitalize">${v.regime||'—'}</span></td>
      <td style="font-family:monospace">${v.conf||'—'}%</td>
      <td style="font-family:monospace">${fmtC(v.capitale)}</td>
      <td style="font-family:monospace">${(v.composizione||[]).length}</td>
      <td style="text-transform:capitalize;color:${REGIME_COLORS[fc_v.regime_4w]||'var(--dim)'}">${fc_v.regime_4w||'—'}</td>
      <td style="font-family:monospace">${fc_v.peso_futuro!=null?(fc_v.peso_futuro*100).toFixed(0)+'%':'—'}</td>
    </tr>`;
  });
}

// ── EQUITY CHART ─────────────────────────────────────────────────────
function drawEquity(eq) {
  const canvas = document.getElementById('c-equity');
  const W = canvas.parentElement.clientWidth;
  canvas.width = W; canvas.style.width = W+'px';
  const H = canvas.height;
  const ctx = canvas.getContext('2d');
  const PAD = {l:65, r:20, t:15, b:28};
  const cw = W - PAD.l - PAD.r;
  const ch = H - PAD.t - PAD.b;

  const vals   = eq.map(e=>e.valore);
  const labels = eq.map(e=>e.mese);
  const base   = 100000;
  const minV   = Math.min(...vals, base) * 0.995;
  const maxV   = Math.max(...vals) * 1.005;
  const sx = i => PAD.l + i/(vals.length-1)*cw;
  const sy = v => PAD.t + (1-(v-minV)/(maxV-minV))*ch;

  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);

  // Griglia
  ctx.strokeStyle='#f0f0f0'; ctx.lineWidth=1;
  for (let i=0;i<=4;i++) {
    const y = PAD.t+ch*i/4;
    ctx.beginPath(); ctx.moveTo(PAD.l,y); ctx.lineTo(W-PAD.r,y); ctx.stroke();
    const v = maxV-(maxV-minV)*i/4;
    ctx.fillStyle='#999'; ctx.font='9px monospace';
    ctx.fillText(Math.round(v/1000)+'k€', 2, y+4);
  }

  // Linea base 100k
  ctx.strokeStyle='#e5e5e5'; ctx.setLineDash([4,4]);
  const yBase = sy(base);
  ctx.beginPath(); ctx.moveTo(PAD.l,yBase); ctx.lineTo(W-PAD.r,yBase); ctx.stroke();
  ctx.setLineDash([]);

  // Area
  ctx.beginPath();
  ctx.moveTo(sx(0), sy(vals[0]));
  vals.forEach((v,i) => ctx.lineTo(sx(i), sy(v)));
  ctx.lineTo(sx(vals.length-1), H-PAD.b);
  ctx.lineTo(PAD.l, H-PAD.b);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0,PAD.t,0,H-PAD.b);
  grad.addColorStop(0,'rgba(124,58,237,0.2)');
  grad.addColorStop(1,'rgba(124,58,237,0)');
  ctx.fillStyle = grad; ctx.fill();

  // Linea
  ctx.strokeStyle='#7c3aed'; ctx.lineWidth=2;
  ctx.beginPath();
  vals.forEach((v,i) => i===0 ? ctx.moveTo(sx(i),sy(v)) : ctx.lineTo(sx(i),sy(v)));
  ctx.stroke();

  // Labels X
  ctx.fillStyle='#999'; ctx.font='9px monospace';
  labels.forEach((l,i) => {
    if (i%2===0 || i===labels.length-1)
      ctx.fillText(l.slice(2), sx(i)-12, H-PAD.b+14);
  });

  // Valore finale
  const lastY = sy(vals[vals.length-1]);
  ctx.fillStyle='#7c3aed'; ctx.font='bold 11px monospace';
  ctx.fillText(fmtC(vals[vals.length-1]), sx(vals.length-1)+4, lastY+4);
}

// ── DONUT COMPOSIZIONE ────────────────────────────────────────────────
function drawDonut(comp) {
  const canvas = document.getElementById('c-donut');
  const W = canvas.parentElement.clientWidth;
  canvas.width = W; canvas.style.width = W+'px';
  const H = canvas.height;
  const ctx = canvas.getContext('2d');

  // Raggruppa per categoria
  const catTotals = {};
  comp.forEach(p => {
    catTotals[p.cat] = (catTotals[p.cat]||0) + (p.peso||0);
  });

  const catColors = {
    az_globale:'#2563eb',az_europa:'#16a34a',az_usa:'#0284c7',az_em:'#b45309',
    tematico:'#7c3aed',hy:'#dc2626',obbligaz_ig:'#6b7280',leva:'#1a1a1a',
    monetario:'#9ca3af',em_bond:'#92400e'
  };

  const cx = W/2, cy = H/2 - 20;
  const R = Math.min(W,H)/2 - 30;
  const r = R * 0.55;

  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);

  let startAngle = -Math.PI/2;
  const entries = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  const total = entries.reduce((s,[,v])=>s+v,0);

  entries.forEach(([cat, pct]) => {
    const angle = (pct/total) * 2 * Math.PI;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, startAngle, startAngle+angle);
    ctx.closePath();
    ctx.fillStyle = catColors[cat]||'#ccc';
    ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    ctx.stroke();

    // Etichetta se > 5%
    if (pct > 5) {
      const midAngle = startAngle + angle/2;
      const lx = cx + (R*0.75)*Math.cos(midAngle);
      const ly = cy + (R*0.75)*Math.sin(midAngle);
      ctx.fillStyle='#fff';
      ctx.font='bold 10px monospace';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText(pct.toFixed(0)+'%', lx, ly);
    }
    startAngle += angle;
  });

  // Foro centrale
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, 2*Math.PI);
  ctx.fillStyle='#fff';
  ctx.fill();

  // Centro testo
  ctx.fillStyle='#111'; ctx.font='bold 14px monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(entries.length+' cat', cx, cy-8);
  ctx.font='11px monospace'; ctx.fillStyle='#666';
  ctx.fillText(comp.length+' ETF', cx, cy+10);

  // Legenda
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  let lx=8, ly=H-20;
  entries.forEach(([cat, pct]) => {
    ctx.fillStyle=catColors[cat]||'#ccc';
    ctx.fillRect(lx, ly-8, 8, 8);
    ctx.fillStyle='#555'; ctx.font='9px monospace';
    ctx.fillText(cat.replace('_',' '), lx+10, ly);
    lx += ctx.measureText(cat.replace('_',' ')).width + 24;
    if (lx > W-80) { lx=8; ly-=14; }
  });
}

load();
</script>
</body>
</html>
